<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Me Somewhere Else — LunaBelle Games</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #111;
  color: #f0f0f0;
  font-family: Georgia, 'Times New Roman', serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 3rem 2rem;
}

.wrap {
  max-width: 480px;
  width: 100%;
  animation: fadeIn 0.6s ease both;
}

.back-link {
  display: block;
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #c9a84c;
  text-decoration: none;
  margin-bottom: 4rem;
  transition: color 0.2s;
}

.back-link:hover { color: #e8c870; }

.label {
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c9a84c;
  margin-bottom: 1.2rem;
}

h1 {
  font-size: clamp(1.4rem, 5vw, 1.8rem);
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #f0f0f0;
  margin-bottom: 1.5rem;
  line-height: 1.4;
}

.desc {
  font-size: 15px;
  color: #999;
  line-height: 1.9;
  margin-bottom: 2.5rem;
  font-family: monospace;
  letter-spacing: 1px;
}

.soon {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  border: 1px solid rgba(201,168,76,0.3);
  padding: 0.6rem 1.4rem;
  border-radius: 8px;
  font-family: monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #c9a84c;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #c9a84c;
  animation: pulse 2s ease infinite;
  flex-shrink: 0;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>
  <div class="wrap">
    <a href="index.html" class="back-link">← lunabelle games</a>
    <p class="label">Stories</p>
    <h1>Take Me Somewhere Else</h1>
    <p class="desc">Weird little choose-your-own-adventure stories born from an overactive brain with a bizarre imagination.<br><br>Something is being written. Stay tuned.</p>
    <div class="soon">
      <span class="dot"></span>
      coming soon
    </div>
  </div>
</body>
</html>
