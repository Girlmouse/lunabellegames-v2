      `You had a crappy day. Your feet hurt, you have a bit of indigestion from the bad choice you called lunch, and your boss said something passive-aggressive about your report. Again. You let out a big sigh. You can't wait to get home and hug the couch.

The 6:15 bus wheezes to the curb. The doors open and hit you with that bus smell — warm, a little stale, like someone ate cheesy snacks in there all day long. You drag yourself up the steps and survey your options.

Window seat. Obviously.

You settle in, shifting until the plastic stops digging into your spine. The bus is about half full. A nurse still in scrubs stares at nothing on the floor. An older man near the front reads a folded newspaper — who reads a newspaper anymore, we're all digital. A group of teenagers a few rows back are doing what teenagers do — phones out, earbuds in, filming each other, saying nothing particularly interesting. The doors hiss shut. The engine groans. The bus lurches forward.

The city slides by in streaks of orange light.

Your eyes get heavy. Your body, the absolute traitor that it is, starts shutting down one system at a time. Just five minutes. Five minutes won't hurt. Five minutes never hurt anyone.

Your head drops against the window, resting like a broom against a wall, nostrils fogging the glass as you breathe.

You are out. Deeply, completely, mouth-possibly-open asleep.`,

      `The bus jerks to a sudden stop and you snap back to reality, grabbing the seat in front of you like it personally owes you something. You sit up. Straighten your jacket. Run a hand through your hair. Check your chin discreetly. Very smooth. Nobody saw that.

Then it hits you.

Damn it. You did not mean to fall asleep. Morty got mugged last week on this exact line. Lost his wallet AND his good headphones. His GOOD ones.

That cold wave of dread moves through you all at once. Your mouth goes dry. Your hand hits your pocket. Then your other pocket. Then your jacket. Then all your pockets again in a full spiral.

Your wallet is gone. GONE. Cash. Cards. Your library card from 2019 that you keep meaning to use. Gone.

Ok. Ok ok ok. Maybe it fell. You lean forward and reach under the seat, arm disappearing into the abyss, fingers sweeping across the floor with the grim determination of someone who has fully committed to this and is not going to think too hard about what they might be touching. Something sticky. A plastic straw. What feels like a single forgotten french fry. No wallet.

You sit back up and wipe your hand on your pants with a slow, dignified grimace.

Alright. New strategy.`,

      `You look around the bus. There. Two seats ahead, a man is holding a wallet, turning it over in his hands like he's inspecting it. Brown. Worn at the corners. Little scuff mark on the left side. Yours is brown. Worn at the corners. Little scuff mark on the — wait. Is that yours? That's yours. That's definitely yours. Actually, wait. Is it? It could just be a similar wallet. Lots of people have brown wallets. That could be anyone's brown wallet. But the scuff mark though. THAT scuff mark.

You need a closer look.

You pull out your phone and hold it up casually, like you're just scrolling. Tilt it slightly. Zoom. A little more. You are very much not pulling this off but you are committed now.

Your phone buzzes in your hand. Of course it does. It's your mom.

You stare at the screen. MOM calling. You answer. You hunch forward, hand cupped around your mouth.

"Mom. Hi. Now is actually not a great—"
"So you know Karen from my book club?" she begins.
"Mom, I'm on the bus, it's really not a good—"
"She told me about chia seeds. For hair. Now before you say anything—"
"Mom—"
"Just listen."`,

      `She found an article. Of course she found an article.

"It says here — and I'm reading directly — that chia seeds contain omega-3 fatty acids, zinc, and protein, all of which are known to support hair follicle health and stimulate growth from the root." A pause for effect. "From the ROOT."

You catch your own reflection in the dark window. You turn your head slightly. Tilt it the other way. Actually, is it looking a little thin up top? You run a hand through your hair slowly, still listening, and now you're kind of inspecting it, mouth slightly open, genuinely assessing the situation your mom has just introduced.

"Now it also says you can add them to smoothies, yogurt, overnight oats—"
"Mom."
"—or just water, they expand in water, which is actually very good for—"
"MOM."
"I'm just saying! Karen's nephew tried it and his hairline came back. His whole hairline. Like it just showed back up one day like nothing happened."

You are still looking at your reflection. You part your hair slightly to the left. Huh.

"Ok mom, I really have to go, I'll call you back, talk soon, bye." You hang up.`,

      `The bus shuffles. People getting on, people getting off, the usual rearranging of strangers. When the movement settles, you glance up. The seat ahead is empty. The man with the wallet is gone.

In the same shuffle, someone new has taken a seat a few rows up — coat, work bag, the face of a person who also had a day. They reach into their coat and tuck something into their inside pocket. A wallet. Brown. Worn at the corners.

You close your eyes for exactly one second.

Then you reach slowly into your own jacket pocket. All the way in.

It's there. Your wallet. Right where it has always been, right where you have kept it for the last four years, exactly where you put it this morning. You pull it out and stare at it.

Ok. Ok so. Your brain is clearly just fried. Absolutely cooked. This is what happens when you work too much and sleep too little and eat lunch at your desk for the fourteenth day in a row. You need to do something fun this weekend. Something that isn't this.

You put the wallet back and look out the window, already trying to think of plans. Maybe that place your friend recommended. Or just a long walk somewhere new. Or you could finally—

You stop.

You don't recognize the street.`,

      `You press your face closer to the glass, really straining your eyes to see. The sidewalks are empty. Not a single person out there. The shop signs are all lit up in red — only red — and you can't quite read them from here. You squint. There's an ice cream parlor on the corner. You think you know that corner.

But the sign says: TONNY'S ICE POOPS.

You blink. It still says that.

The air inside the bus feels heavier now. The sounds — the engine, the wheels, the other passengers — have gone flat somehow. Muffled. Wrong.

And then, from the front of the bus, soft and unhurried, the driver starts to whistle.

Row, row, row your boat, gently down the stream...

You reach for your phone. Dead. Of course it is.

The passenger in the seat ahead of you might know where you are.

"Excuse me — sorry to bother you, do you know what the next stop is?"

Nothing. You try again, a little more insistent.

What happens next will stay with you.

Their head separates from their body with a sound like a cabinet closing — a soft hollow clunk — rolls down the aisle in a slow unhurried arc, and comes to rest against the driver's partition. The driver does not react. He keeps whistling. Row, row, row your boat...`,

      `You look left. You look right.

Every single passenger on this bus is a mannequin. All of them. Perfectly still. Perfectly dressed. Staring at nothing with their painted eyes. Their hands sit in their laps at angles that are almost right but not quite.

You sit with this information for a moment.

You slap yourself. Your head jerks sideways. The sound is very loud in the silence. Nothing happens. The mannequins remain. The head is still on the floor. The driver keeps whistling. Merrily, merrily, merrily, merrily...

You stand up and grab the overhead rail, holding on while trying to figure out your next move.

The bus takes a sharp turn. Then another. You almost lose your balance. It lurches hard and the mannequins — every single one of them — tip and slide and collapse all at once. The sound is a cascading hollow clatter, arms hitting armrests, torsos slumping, heads separating and rolling in every direction, that dry plastic knock knock knock filling the aisle. You grab the overhead rail tighter, watching — a leg here, an arm there, a head spinning lazily past your foot.

It looks like a bad music video filmed in an abandoned warehouse.

And through all of it, steady and soft from the front:
Row, row, row your boat, gently down the stream...`,

And then it speaks.

"I'm hungry for some toes... yum yum yum."

Too smooth. Too cheerful. Like a toy that won't quite die.

Another one joins in. Then another. All of them now — a chorus of hollow plastic voices, getting louder, rolling toward you with purpose. That dry papery whisper of dozens of heads moving across the floor, all coming your way.

You climb onto the nearest seat, grab the overhead rail with both hands, feet as far off the floor as possible.

They keep coming.

"STAY AWAY FROM MY TOES, YOU PLASTIC MONSTERS!"

The bus jerks. Hard.

The world goes dark.`,

      `You open your eyes.

Everything snaps back at once — the brightness, the cool air, the solid ordinary realness of the bus.

Every passenger is looking at you.

The heat hits your face immediately. A few people are openly laughing. The teenagers near the back have their phones pointed straight at you. You can hear yourself through someone's speaker, loud and clear, on a loop:

"STAY AWAY FROM MY TOES, YOU PLASTIC MONSTERS!"
"STAY AWAY FROM MY TOES, YOU PLASTIC MONSTERS!"
"STAY AWAY FROM MY TOES, YOU PLASTIC MONSTERS!"

Laughter starts to spread.

The nurse has her hand over her mouth. The man with the newspaper has put it down completely. The woman with the tote bag is pressing her lips together so hard they've gone white.

The driver is watching you in the mirror.

You were asleep. You were absolutely, completely, horrifyingly asleep on this bus.

You make a decision.

You stand up. Smooth your jacket with both hands. Look around at every single person looking at you.

And you take a bow. One hand behind your back, the full thing, committed.

The bus loses it. Actual applause. The teenagers are screaming. The tote bag woman finally laughs — a real one, loud. The man with the newspaper shakes his head slowly with what might be respect. Even the driver's shoulders move.`,

      `Your stop is next. You make your way to the doors, nodding at a few people still grinning at you. Gracious. Dignified. A performer acknowledging his audience.

The doors open. You step out into the cool night air.

You zip your jacket. Fish your phone out of your pocket — somehow alive again, the way phones are. You take a breath and are about to start walking away.

And then, behind you:

Row, row, row your boat, gently down the stream...

You stop.

You turn around slowly.

The bus is still at the curb, doors half closed. Through the door you can see the driver, getting ready to pull away.

Then he looks at you.

The doors are closing. You stand there, frozen, as his eyes hold yours — calm, steady, like he's been expecting this moment. He raises one hand off the wheel. Two fingers to his temple. A slow, easy tap.

See ya.

Small smile. Eyes still on yours.

The doors close with a hiss. The bus pulls away.

You stand on the sidewalk and watch the taillights disappear around the corner, the whistling fading with them.

Merrily, merrily, merrily, merrily...

You don't move for a moment.

Life is but a dream.`

      `It was just another Saturday afternoon when Susan decided to go shopping.

She lived alone, and her life ran like a well-oiled machine. Weekends were for chores, errands, and a carefully maintained routine that left no room for surprises. The floors were clean, the counters were clear, and everything in Susan's apartment had a place and stayed in it. She liked it that way. She had always liked it that way.

A coupon had arrived in the mail — home goods, the store down the street. She added it to her Saturday list, right between vacuum living room and wipe down kitchen cabinets.

She got dressed, glanced out the window at the sky, and decided to drive. It looked like rain.

Before she left, she shook the treat bag twice. Jinx appeared from wherever he'd been and sat at her feet with the focused intensity of someone attending an important meeting. She gave him two treats, not one — he had opinions about one — and headed out.`,

      `The store was quiet the way stores are on Saturday afternoons — a few other people pushing carts without urgency, soft music nobody was listening to. Susan browsed without rushing. A few candles. Some dish soap. She stopped at a display of kitchen towels and put a set in her cart. They had daisies on them. She liked daisies.

She almost missed the aisle entirely. A small sign at the entrance read: Discontinued Items / Major Sale. She turned in.

That's where she saw it.

A trash can. Bigger than a regular one, but not absurdly so. Stainless steel, floor pedal, no other features. She almost walked past it. Then she noticed something and stopped.

No reflection.

She leaned in closer. The steel was smooth, the surface clean, but when she looked at it directly — nothing looked back. She touched it. It felt like metal. Cold. Solid. Real. She pressed the pedal with her foot. The lid opened and closed without a sound.

She stood there for a moment.

Then she put it in her cart.`,

      `When she got home, Jinx was already at the door.

He didn't care about the bags. He didn't care about the large stainless steel cylinder she was maneuvering through the doorway. He sat in the middle of the entryway and stared at her with the patient, unwavering expression of someone who knew exactly what they were owed and was prepared to wait.

She gave him his treat. He accepted it without fanfare and walked away.

Susan set up the trash can in the kitchen — slightly to the left of where the old one had been, which turned out to be the correct position, more balanced, better flow — and went about the rest of her afternoon. Cabinets wiped. Living room vacuumed. Laundry folded and put away. By evening she was on the couch with tea, watching The Bachelor with the quiet contentment of someone whose list was fully checked off.

Tired, she decided it was bedtime. On her way she stopped by the kitchen and threw away the coupon flier — she had no more use for it and it was cluttering her counters.`,

Empty.

She stood very still for a moment.

It had been the only thing in there. She was certain of it — she had thrown it away before bed, the can had been empty before that, she had set it up fresh that same afternoon. Susan did not misremember things. She opened a few drawers, checked the counter, retraced her steps from the night before with the focused efficiency of someone filing a report. She even checked her purse, though she already knew it wasn't there.

Nothing.

Her eyes landed on the clock. Nine a.m. She had a schedule.

She made breakfast. Eggs and toast, same as every Sunday. When she was done she threw away the remains, rinsed her plate and went about her morning. Bathroom next — she worked through it methodically, scrubbing, wiping, restocking. When she reached under the sink for a new hand soap she pulled out the old dispenser and carried it to the kitchen to throw it away.

She pressed the pedal. The lid opened.

She stopped.

Empty.`,

Nothing. Just the bag, empty, sitting at the bottom of a perfectly clean can.

She let the lid close and stood there for a moment, hands at her sides, looking at the trash can the way you look at something that has just changed the terms of an agreement you didn't know you'd made.

She walked to the pantry and came back with a potato.

Dropped it in. Let the lid close. Pressed the pedal.

Gone.

She stared at the can with the suspicion of a child sitting in front of a plate of broccoli who had been promised ice cream after.

She grabbed a clean fork from the dish holder by the sink. Dropped it in.

Gone.

She walked to the front door, picked up her shoes — neatly placed, toes pointing out, exactly where she always left them — carried them to the kitchen and dropped them in one at a time.

Gone. Gone.`,

She leaned in a little further.

The can swallowed her. She was gone. Darkness, falling, then nothing.`,

There they were.

She put her glasses on and the world came into focus.

She knew this place.

She walked slowly toward the seesaw and pushed one end down with her hand.

It squeaked.

Exactly like she remembered.

She stood there for a moment, just holding it, then let it go and kept walking. Along the side of the building, a large tree rose up from the ground, its branches spreading wide. She stopped and looked at it.

It was smaller than she remembered.

She turned and walked toward the building.`,

Her eyes went to the desk by the window.

That had been hers.

She stood there for a moment, something quiet moving through her. Then she kept walking. Faster now. Like she knew where she was going. Like she'd always known.

She stopped in front of a door at the end of the hall.

Keep Out — No Kids Allowed.

Susan looked at it for a long time.

She had thought about this door for years. Longer than she would ever admit to anyone. As a child she had been so close once — hand on the handle, heart hammering — before Ms. Bonnie materialized from nowhere and redirected her with a firm hand on the shoulder and a look that closed the subject permanently.

Now there was nobody to stop her. She pushed it open.`,

      `The smell hit her first.

Disinfectant. Clean and sharp and familiar — the same smell that lived in the hallways, in the classrooms, in every corner of this place she remembered. She breathed it in without thinking. It smelled like order. Like everything in its right place.

The room was pristine.

Shelves along every wall, floor to ceiling, neat and undisturbed. On the upper shelves, dolls — beautiful ones, porcelain faces and careful dresses, arranged with the same quiet precision as everything else in the room. Below them, rows of small wooden crates, each one labeled in the same careful handwriting. She stepped inside and let the door swing gently behind her.

Somewhere in the room, faint and far away, a melody.

She stopped.

She knew that song. She hadn't thought about it in years — decades — but her body recognized it before her mind did. The nap time song. The one they played every afternoon when the lights went low and the little mats came out and Susan would lie there wide awake staring at the ceiling because she had never been able to just stop like that, just switch off, just let go.

She had always hated that song.

She stood there listening to it for a moment. Then she shook her head slightly and walked along the shelves, reading the names on the crates. Some she recognized. Some she didn't. She moved slowly, unhurried, running her finger lightly along the edges.

She stopped.

Her name. Right there, on a crate sitting at exactly eye level, like it was waiting for her.`,

      `Susan stood very still.

She mouthed the letters slowly, one by one, making sure.

The melody was getting louder.

She reached for the crate with her right hand, slow, deliberate. The moment before she was about to grab it, the floor gave way. She fell fast, like on a spiral slippery slide. She had no time to comprehend what was happening. She tried to scream but nothing came out.

She landed hard on something that caught her — a broken crib, the wood splitting under the impact but holding just enough to slow her fall. She lay still, blinking into the dark, waiting for her breath to come back. Then, slowly, the legs gave way beneath her and the whole thing dropped with a soft collapse, settling into the floor in a cloud of dust and the heavy, close smell of mold.

She lay there for a few seconds, staring up at nothing.

Then she sat up, wiped her face with the back of her hand, and looked around.

Dark. Not completely — her eyes were adjusting — but dim enough that the edges of things were suggestions rather than facts. Piles of broken wall. Splintered wood. Old cabinets reduced to their frames, drawers missing, hardware rusted. The debris rose around her in uneven mounds, and somewhere above and to the left, a thin pale glow. Small. But there.`,

      `Susan assessed the situation. She decided the way out was up, so she tried to map, the best she could, a path to get there. There were a few cabinets stacked on top of each other. She shook them to check for stability. She moved carefully and deliberately, the way she did everything — testing each piece before trusting it, shifting her weight slowly, listening for the groan of something about to give. The debris was the problem, not her. It shifted unpredictably, a plank that seemed solid suddenly sliding, a chunk of plaster crumbling under her palm. She paused each time, recalibrated, kept going. Her arms were steady. Years of scrubbing floors and lifting and moving furniture had seen to that.

She was almost there. The light was close now, coming through a narrow gap in the rubble above her. She pushed at the debris around it, carefully at first then with more force when it held. Something shifted. She pushed again. A small avalanche of plaster and dust rained down past her and she pressed her face against her shoulder and waited for it to settle.

Then she pushed through. She was wriggling her way through some kind of cylindrical shape, narrowing as she went. The light got brighter and she had to squint for a second. Then her eyes got really big.`,

      `She was in her kitchen. Standing in the mysterious trash can, probably looking like a mad woman.

Jinx was on the floor beside the trash can, one paw resting on the floor pedal, lid open, completely absorbed in cleaning his face with the methodical focus of a cat with a modeling job.

Susan looked down towards her feet. She stomped a few times, even did a small jump up and down. Nothing happened. Solid surface. Just the bottom of a trash can.

She climbed out. Straightened up. Looked at Jinx.

He glanced at her. Went back to his paw.

She wiped the dust and plaster from her forehead with her arm, looked around her clean bright kitchen, looked at the trash can, looked at Jinx.

And she started laughing as she collapsed on the clean floor. She lay there for what felt like hours, just rewinding what had just happened. Staring at the ceiling, smiling with the satisfaction of someone who had solved a mystery. She fell asleep on the floor and was woken by a hungry cat some hours later. She fed Jinx, put a new trash bag in the trash can, then took a shower.

The next few days felt different, like the way it feels after you've had an extraordinary adventure. She went about her week quietly, thinking about it in the background the way you think about a dream you don't want to forget.

Then on Tuesday evening she walked to the kitchen, picked up an empty cereal box and dropped it in the trash can.

She pressed the pedal and looked in.

Still there.`,

      `She tested it, of course. Threw something in, checked — still there. Threw in something else. Still there. Stood in her kitchen on a Tuesday evening pressing the pedal over and over with the focused determination of a woman who needed to understand something before she could file it away.

Just a trash can.

She kept checking every few days, for a while. Opening the lid, looking in, closing it again. Jinx stopped paying attention after the first week.

Eventually Susan stopped too.`
    ]
  }
];

let currentStory = null;
let currentPage = 0;

function goHome() {
  document.getElementById('screen-title').style.display = 'block';
  document.getElementById('screen-reader').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startStory(id) {
  currentStory = STORIES.find(s => s.id === id);
  if (!currentStory) return;
  currentPage = 0;
  document.getElementById('screen-title').style.display = 'none';
  document.getElementById('screen-reader').style.display = 'block';
  document.getElementById('readerTitle').textContent = currentStory.title.toUpperCase();
  renderPage();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderPage() {
  const total = currentStory.pages.length;
  const isLast = currentPage === total - 1;
  const isEnd = currentPage === total;

  document.getElementById('readerProgress').textContent = isEnd ? '' : `${currentPage + 1} / ${total}`;

  if (isEnd) {
    document.getElementById('pageContent').innerHTML = `
      <div class="end-wrap">
        <span class="end-tag">— the end —</span>
        <div class="end-btns">
          <button class="end-btn" onclick="currentPage=0; renderPage();">read again</button>
          <button class="end-btn" onclick="goHome()">all stories</button>
        </div>
      </div>`;
    return;
  }

  const text = currentStory.pages[currentPage];

  document.getElementById('pageContent').innerHTML = `
    <div class="page-content">
      <div class="page-text">${text.replace(/\n/g, '<br>')}</div>
      <div class="page-nav">
        <button class="page-btn" onclick="navigate(-1)" ${currentPage === 0 ? 'disabled' : ''}>← back</button>
        <span class="page-indicator">${currentPage + 1} / ${total}</span>
        <button class="page-btn ${isLast ? 'page-btn-end' : ''}" onclick="navigate(1)">${isLast ? 'finish →' : 'next →'}</button>
      </div>
    </div>`;
}

function navigate(dir) {
  currentPage = Math.max(0, currentPage + dir);
  if (currentPage > currentStory.pages.length - 1 && dir > 0) {
    currentPage = currentStory.pages.length;
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderPage();
}

// Build story list
function buildList() {
  const list = document.getElementById('storyList');
  list.innerHTML = STORIES.map((s, i) => `
    <div class="story-card ${s.locked ? 'locked' : ''}" ${!s.locked ? `onclick="startStory('${s.id}')"` : ''}>
      <div class="story-card-num">Story ${String(i+1).padStart(2,'0')}</div>
      <h3>${s.title}</h3>
      <p>${s.tagline}</p>
    </div>
  `).join('');
}

buildList();
</script>
</body>
</html>
